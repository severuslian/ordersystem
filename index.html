<script>
// Unregister old service workers first, then redirect
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    Promise.all(regs.map(r => r.unregister())).then(() => {
      window.location.replace('catalog-tool.html?build=20260326154634');
    });
  });
} else {
  window.location.replace('catalog-tool.html?build=20260326154634');
}
</script>
